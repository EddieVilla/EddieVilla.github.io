<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eddie Villasenor's personal page</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f1ea;
      --ink: #1a1a1a;
      --accent: #c8553d;
      --muted: #6b6b6b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Fraunces', Georgia, serif;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
      position: relative;
    }

    /* subtle grid backdrop */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(0,0,0,0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0,0,0,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    main {
      position: relative;
      text-align: center;
      padding: 2rem;
      animation: rise 0.9s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    h1 {
      font-weight: 300;
      font-size: clamp(3rem, 12vw, 9rem);
      letter-spacing: -0.04em;
      line-height: 0.95;
      font-variation-settings: "opsz" 144;
    }

    h1 .world {
      font-style: italic;
      font-weight: 600;
      color: var(--accent);
    }

    .dot {
      display: inline-block;
      color: var(--accent);
      animation: blink 1.4s steps(2, end) infinite;
    }

    .meta {
      margin-top: 2rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .cta {
      display: inline-block;
      margin-top: 2.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--accent);
      transition: color 0.2s ease;
    }

    .cta .arrow {
      display: inline-block;
      margin-left: 0.5em;
      transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .cta:hover { color: var(--accent); }
    .cta:hover .arrow { transform: translateX(4px); }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">Welcome from</div>
    <h1>Eddie <span class="world">Villasenor</span><span class="dot">_</span></h1>
    <div class="meta">// Software Engineer</div>
    <a class="cta" href="contact/">contact <span class="arrow">→</span></a>
  </main>
</body>
</html>
